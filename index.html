const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        switch(type) {
            case 'jump': osc.type='square';osc.frequency.setValueAtTime(300,t);osc.frequency.linearRampToValueAtTime(600,t+0.1);gain.gain.setValueAtTime(0.15,t);gain.gain.linearRampToValueAtTime(0,t+0.15);osc.start(t);osc.stop(t+0.15);break;
            case 'poop': osc.type='sawtooth';osc.frequency.setValueAtTime(400,t);osc.frequency.linearRampToValueAtTime(80,t+0.25);gain.gain.setValueAtTime(0.12,t);gain.gain.linearRampToValueAtTime(0,t+0.3);osc.start(t);osc.stop(t+0.3);break;
            case 'splat': osc.type='sawtooth';osc.frequency.setValueAtTime(200,t);osc.frequency.linearRampToValueAtTime(50,t+0.2);gain.gain.setValueAtTime(0.2,t);gain.gain.linearRampToValueAtTime(0,t+0.25);osc.start(t);osc.stop(t+0.25);break;
            case 'coin': osc.type='square';osc.frequency.setValueAtTime(800,t);osc.frequency.setValueAtTime(1200,t+0.08);gain.gain.setValueAtTime(0.12,t);gain.gain.linearRampToValueAtTime(0,t+0.2);osc.start(t);osc.stop(t+0.2);break;
            case 'hit': osc.type='square';osc.frequency.setValueAtTime(200,t);osc.frequency.linearRampToValueAtTime(80,t+0.15);gain.gain.setValueAtTime(0.2,t);gain.gain.linearRampToValueAtTime(0,t+0.2);osc.start(t);osc.stop(t+0.2);break;
            case 'stomp': osc.type='triangle';osc.frequency.setValueAtTime(500,t);osc.frequency.linearRampToValueAtTime(100,t+0.12);gain.gain.setValueAtTime(0.2,t);gain.gain.linearRampToValueAtTime(0,t+0.15);osc.start(t);osc.stop(t+0.15);break;
            case 'peck': osc.type='square';osc.frequency.setValueAtTime(600,t);osc.frequency.linearRampToValueAtTime(900,t+0.05);osc.frequency.linearRampToValueAtTime(400,t+0.1);gain.gain.setValueAtTime(0.18,t);gain.gain.linearRampToValueAtTime(0,t+0.12);osc.start(t);osc.stop(t+0.12);break;
            case 'sling': osc.type='triangle';osc.frequency.setValueAtTime(150,t);osc.frequency.linearRampToValueAtTime(300,t+0.05);osc.frequency.linearRampToValueAtTime(100,t+0.15);gain.gain.setValueAtTime(0.1,t);gain.gain.linearRampToValueAtTime(0,t+0.2);osc.start(t);osc.stop(t+0.2);break;
        }
    } catch(e) {}
}

function getCityForLevel(lvl) {
    if (lvl === 0) return 'budapest';
    if (lvl === 1) return 'london';
    if (lvl === 2) return 'paris';
    return 'venice';
}

function generateClouds() {
    clouds = [];
    for (let i = 0; i < 20; i++)
        clouds.push({ x:Math.random()*LEVEL_WIDTH, y:15+Math.random()*100, w:50+Math.random()*90, h:20+Math.random()*25, speed:0.15+Math.random()*0.4 });
}

function generateLevel(lvl) {
    buildings=[]; farBuildings=[]; sparrows=[]; humans=[]; seeds=[]; poops=[]; bullets=[]; particles=[]; streetProps=[]; groundTiles=[];
    seedsCollected=0; comboCount=0; comboTimer=0; comboTexts=[];

    const city = getCityForLevel(lvl);

    for (let x=0; x<LEVEL_WIDTH; x+=80) groundTiles.push({x, y:GROUND_Y, w:80, h:60});

    // Far buildings
    for (let x=-200; x<LEVEL_WIDTH+200; x+=55+Math.random()*35) {
        const bh = 80+Math.random()*180;
        const colors = city==='london' ? ['#505050','#606060','#555','#4A4A4A','#5A5A5A'] :
                        city==='paris' ? ['#D0C8B0','#C8C0A8','#B8B098','#C0B8A0','#D8D0B8'] :
                        city==='venice' ? ['#E8C8A0','#D8B890','#C8A880','#D0C098','#E0D0B0'] :
                        ['#8899AA','#99AABB','#778899','#AABBCC','#889988'];
        farBuildings.push({ x, y:GROUND_Y-bh, w:45+Math.random()*55, h:bh,
            color: colors[Math.floor(Math.random()*5)], windows: Math.random()>0.2 });
    }

    // Landmarks per level - Budapest has ALL its landmarks on one level
    const landmarkMap = {
        0: [{pos:0.12,type:'parlament'},{pos:0.28,type:'lanchid'},{pos:0.42,type:'bazilika'},{pos:0.55,type:'opera'},{pos:0.65,type:'vajdahunyad'},{pos:0.75,type:'szechenyi'},{pos:0.85,type:'gellert'},{pos:0.93,type:'citadella'}],
        1: [{pos:0.25,type:'big_ben'},{pos:0.5,type:'tower_bridge'},{pos:0.75,type:'buckingham'}],
        2: [{pos:0.25,type:'eiffel'},{pos:0.5,type:'notre_dame'},{pos:0.75,type:'arc_triomphe'}],
        3: [{pos:0.2,type:'rialto'},{pos:0.5,type:'san_marco'},{pos:0.8,type:'campanile'}],
    };
    const lvlLandmarks = landmarkMap[lvl] || [];
    const landmarkPositions = lvlLandmarks.map(l => Math.floor(l.pos * LEVEL_WIDTH));
    let landmarkIdx = 0;

    // Regular building types per city
    const cityBuildings = {
        budapest: ['berhaz','berhaz2','berhaz3','berhaz4','berhaz5'],
        london: ['london_house','london_house2','london_house3'],
        paris: ['paris_house','paris_house2','paris_house3'],
        venice: ['venice_house','venice_house2','venice_house3']
    };

    let bx = 60;
    while (bx < LEVEL_WIDTH - 80) {
        let btype, bw, bh;
        if (landmarkIdx < landmarkPositions.length && bx >= landmarkPositions[landmarkIdx] - 50) {
            btype = lvlLandmarks[landmarkIdx].type; landmarkIdx++;
            bw = 180+Math.random()*60; bh = 200+Math.random()*80;
        } else {
            const types = cityBuildings[city] || cityBuildings.budapest;
            btype = types[Math.floor(Math.random()*types.length)];
            bw = 65+Math.random()*55; bh = 80+Math.random()*130;
        }
        buildings.push({ x:bx, y:GROUND_Y-bh, w:bw, h:bh, type:btype });
        bx += bw + 3 + Math.random()*15;
    }

    // Street props
    for (let sx=150; sx<LEVEL_WIDTH-150; sx+=100+Math.random()*80) {
        const r=Math.random();
        streetProps.push({x:sx, type: r<0.3?'lamp':r<0.55?'bench':r<0.75?'tree':'bin'});
    }

    // Enemies
    const sparrowCount = 4 + lvl*2;
    for (let i=0; i<sparrowCount; i++) {
        const sx = 350+(i/sparrowCount)*(LEVEL_WIDTH-500);
        sparrows.push({ x:sx, y:100+Math.random()*180, w:55, h:40,
            vx:(1.5+Math.random()*1.5)*(Math.random()<0.5?1:-1), vy:0,
            alive:true, deathTimer:0, startX:sx, startY:100+Math.random()*180,
            patrol:120+Math.random()*100, flyTimer:Math.random()*Math.PI*2, wingFrame:0, wingTimer:0 });
    }
    const humanCount = 2+lvl;
    for (let i=0; i<humanCount; i++) {
        const hx = 500+(i/humanCount)*(LEVEL_WIDTH-700);
        humans.push({ x:hx, y:GROUND_Y-80, w:40, h:80,
            vx:(0.4+Math.random()*0.6)*(Math.random()<0.5?1:-1),
            alive:true, deathTimer:0, startX:hx, patrol:60+Math.random()*50,
            shootCooldown:80+Math.random()*80, shootTimer:0, isAiming:false, aimTimer:0 });
    }

    // Seeds near enemies
    const allEnemies = [];
    sparrows.forEach(s => allEnemies.push({x:s.x, y:s.startY}));
    humans.forEach(h => allEnemies.push({x:h.x, y:h.y-40}));
    allEnemies.sort(() => Math.random()-0.5);
    for (let i=0; i<totalSeeds; i++) {
        const en = allEnemies[i%allEnemies.length];
        seeds.push({x:en.x+(Math.random()-0.5)*80, y:en.y+(Math.random()-0.5)*40, w:35, h:20, collected:false, bobTimer:Math.random()*Math.PI*2});
    }

    player.x=100; player.y=GROUND_Y-player.h-10; player.vx=0; player.vy=0;
    player.onGround=false; player.isFlying=false; player.invincible=60; player.poopCooldown=0;
    player.wingFrame=0; player.wingTimer=0;
    camera.x=0;
    generateClouds();
}

// ==================== BUILDING DRAWING ====================
function drawBuilding(b, offsetX) {
    const x=b.x-offsetX, y=b.y, w=b.w, h=b.h;
    ctx.save();

    // Dispatch to specific draw functions
    const specials = ['parlament','lanchid','bazilika','opera','vajdahunyad','szechenyi','gellert','citadella',
        'big_ben','tower_bridge','buckingham','eiffel','notre_dame','arc_triomphe','rialto','san_marco','campanile'];
    if (specials.includes(b.type)) {
        const fn = drawFns[b.type];
        if (fn) fn(x,y,w,h);
        ctx.restore(); return;
    }

    // Generic house based on city
    let pal;
    if (b.type.startsWith('london')) {
        pal = { wall:'#8B0000', trim:'#333', roof:'#2F2F2F', win:'#ADD8E6', door:'#1a1a1a' };
        if (b.type==='london_house2') pal.wall='#D2691E';
        if (b.type==='london_house3') pal.wall='#F5F5DC';
    } else if (b.type.startsWith('paris')) {
        pal = { wall:'#F5ECD7', trim:'#B8A88A', roof:'#5F6B7C', win:'#B0D4F1', door:'#5C3317' };
        if (b.type==='paris_house2') pal.wall='#FFF8E7';
        if (b.type==='paris_house3') pal.wall='#EDE0CC';
    } else if (b.type.startsWith('venice')) {
        pal = { wall:'#FFD59A', trim:'#C8A060', roof:'#CD5C5C', win:'#87CEEB', door:'#654321' };
        if (b.type==='venice_house2') pal.wall='#FFB6B6';
        if (b.type==='venice_house3') pal.wall='#FFFACD';
    } else {
        const palettes = {
            berhaz:{wall:'#F5DEB3',trim:'#D2B48C',roof:'#8B4513',win:'#6BA3D6',door:'#654321'},
            berhaz2:{wall:'#FFE4C4',trim:'#DEB887',roof:'#A0522D',win:'#7BB5E0',door:'#8B4513'},
            berhaz3:{wall:'#E8D5B7',trim:'#C4A882',roof:'#7B3F00',win:'#5B93BE',door:'#5C3317'},
            berhaz4:{wall:'#FFF8DC',trim:'#EEE8AA',roof:'#B8860B',win:'#87CEEB',door:'#654321'},
            berhaz5:{wall:'#FAF0E6',trim:'#DDD0B8',roof:'#A0522D',win:'#6CA6CD',door:'#8B4513'},
            berhaz_grand:{wall:'#FFFACD',trim:'#DAA520',roof:'#8B6914',win:'#87CEEB',door:'#654321'},
        };
        pal = palettes[b.type] || palettes.berhaz;
    }

    // Draw generic house
    ctx.fillStyle=pal.wall; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=pal.trim; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
    ctx.fillStyle=pal.trim; ctx.fillRect(x,y,w,5); ctx.fillRect(x,y+h-2,w,2);
    const floorH=32;
    for(let fy=y+floorH;fy<y+h-25;fy+=floorH) ctx.fillRect(x,fy,w,2);
    ctx.fillStyle=pal.roof; ctx.fillRect(x-2,y-5,w+4,7);
    ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(x-2,y-5,w+4,7);

    // London: sometimes chimney pots
    if (b.type.startsWith('london')) {
        ctx.fillStyle='#333'; ctx.fillRect(x+w*0.3,y-22,6,18); ctx.fillRect(x+w*0.7,y-22,6,18);
        ctx.fillStyle='#8B0000'; ctx.fillRect(x+w*0.3-1,y-24,8,3); ctx.fillRect(x+w*0.7-1,y-24,8,3);
    }
    // Paris: mansard roof
    if (b.type.startsWith('paris')) {
        ctx.fillStyle='#5F6B7C';
        ctx.beginPath(); ctx.moveTo(x-2,y-5); ctx.lineTo(x+5,y-20); ctx.lineTo(x+w-5,y-20); ctx.lineTo(x+w+2,y-5); ctx.fill();
        ctx.strokeStyle='#444'; ctx.stroke();
        // Dormers
        for(let dx=x+15;dx<x+w-15;dx+=25){ctx.fillStyle=pal.win;ctx.fillRect(dx,y-18,8,10);ctx.fillStyle='#5F6B7C';ctx.beginPath();ctx.moveTo(dx-1,y-18);ctx.lineTo(dx+4,y-24);ctx.lineTo(dx+9,y-18);ctx.fill();}
    }
    // Venice: terracotta elements
    if (b.type.startsWith('venice')) {
        // Gothic/pointed arches over windows
    }

    // Chimney (budapest)
    if (b.type.startsWith('berhaz')) {
        ctx.fillStyle='#7B3F00'; ctx.fillRect(x+w*0.3,y-18,8,14);
        ctx.fillStyle='#8B4513'; ctx.fillRect(x+w*0.3-1,y-20,10,3);
    }

    // Windows
    const winW=11, winH=16, cols=Math.max(1,Math.floor((w-14)/20));
    const startX2=x+(w-cols*20+9)/2;
    for(let fy=y+9;fy<y+h-28;fy+=floorH){
        for(let c=0;c<cols;c++){
            const wx=startX2+c*20;
            ctx.fillStyle='#F5F5F0'; ctx.fillRect(wx-1,fy-1,winW+2,winH+2);
            ctx.fillStyle=pal.win; ctx.fillRect(wx,fy,winW,winH);
            ctx.strokeStyle='#F5F5F0'; ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(wx+winW/2,fy);ctx.lineTo(wx+winW/2,fy+winH);ctx.moveTo(wx,fy+winH/2);ctx.lineTo(wx+winW,fy+winH/2);ctx.stroke();
            ctx.fillStyle=pal.trim; ctx.fillRect(wx-1,fy+winH,winW+2,2);
        }
    }
    // Door
    const dW=14,dH=24,dX=x+w/2-dW/2,dY=y+h-dH;
    ctx.fillStyle=pal.door;ctx.fillRect(dX,dY,dW,dH);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(dX,dY,dW,dH);
    ctx.fillStyle=pal.trim;ctx.beginPath();ctx.arc(dX+dW/2,dY,dW/2+1,Math.PI,0);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(dX+dW-3,dY+dH/2,1.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
}

drawFns.opera = function(x,y,w,h){ctx.fillStyle='#F0E8D0';ctx.fillRect(x,y+20,w,h-20);ctx.fillStyle='#D4C8A8';ctx.beginPath();ctx.moveTo(x+10,y+20);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w-10,y+20);ctx.fill();for(let px=x+12;px<x+w-10;px+=18){ctx.fillStyle='#E8E0D0';ctx.fillRect(px,y+20,6,h-50);}for(let fy=y+35;fy<y+h-25;fy+=28)for(let fx=x+15;fx<x+w-15;fx+=22){ctx.fillStyle='#FFD700';ctx.fillRect(fx,fy,10,14);}ctx.fillStyle='#8B6914';ctx.font='bold 8px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('OPERA',x+w/2,y+15);ctx.textAlign='left';};
drawFns.vajdahunyad = function(x,y,w,h){ctx.fillStyle='#D2B48C';ctx.fillRect(x,y+20,w,h-20);for(const tx of[x,x+w-25]){ctx.fillStyle='#C0A070';ctx.fillRect(tx,y-10,25,h+10);ctx.fillStyle='#8B4513';ctx.beginPath();ctx.moveTo(tx-3,y-10);ctx.lineTo(tx+12,y-40);ctx.lineTo(tx+28,y-10);ctx.fill();}for(let fy=y+30;fy<y+h-20;fy+=25)for(let fx=x+30;fx<x+w-30;fx+=18){ctx.fillStyle='#87CEEB';ctx.fillRect(fx,fy,7,12);}ctx.fillStyle='#654321';ctx.font='bold 7px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('VAJDAHUNYAD',x+w/2,y+15);ctx.textAlign='left';};
drawFns.szechenyi = function(x,y,w,h){ctx.fillStyle='#FFE44D';ctx.fillRect(x,y+20,w,h-20);ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.arc(x+w/2,y+20,25,Math.PI,0);ctx.fill();ctx.fillStyle='#4682B4';ctx.fillRect(x+10,y+h-18,w-20,13);ctx.fillStyle='#8B6914';ctx.font='bold 7px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('SZÉCHENYI',x+w/2,y+15);ctx.textAlign='left';};
drawFns.gellert = function(x,y,w,h){ctx.fillStyle='#E8E0C8';ctx.fillRect(x,y+15,w,h-15);ctx.fillStyle='#2E8B57';ctx.beginPath();ctx.arc(x+w/2,y-15,15,Math.PI,0);ctx.fill();for(let fy=y+25;fy<y+h-20;fy+=25)for(let fx=x+10;fx<x+w-10;fx+=18){ctx.fillStyle='#87CEEB';ctx.fillRect(fx,fy,8,14);}ctx.fillStyle='#555';ctx.font='bold 8px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('GELLÉRT',x+w/2,y+10);ctx.textAlign='left';};
drawFns.citadella = function(x,y,w,h){ctx.fillStyle='#A08060';ctx.fillRect(x,y+10,w,h-10);for(let b2=x;b2<x+w;b2+=12)ctx.fillRect(b2,y,8,14);ctx.fillStyle='#2E8B57';ctx.fillRect(x+w/2-3,y-45,6,45);ctx.fillRect(x+w/2-10,y-42,20,3);ctx.fillRect(x+w/2+5,y-55,3,15);ctx.fillStyle='#444';ctx.font='bold 7px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('CITADELLA',x+w/2,y+h-5);ctx.textAlign='left';};

drawFns.big_ben = function(x,y,w,h) {
    // Tower
    ctx.fillStyle='#D4C8A0';ctx.fillRect(x+w/2-20,y+20,40,h-20);ctx.strokeStyle='#8B7355';ctx.lineWidth=2;ctx.strokeRect(x+w/2-20,y+20,40,h-20);
    // Clock face
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+w/2,y+60,16,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
    // Clock hands
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+w/2,y+60);ctx.lineTo(x+w/2,y+48);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+w/2,y+60);ctx.lineTo(x+w/2+10,y+58);ctx.stroke();
    // Gothic spire on top
    ctx.fillStyle='#8B7355';ctx.beginPath();ctx.moveTo(x+w/2-18,y+20);ctx.lineTo(x+w/2,y-30);ctx.lineTo(x+w/2+18,y+20);ctx.fill();ctx.stroke();
    // Gold tip
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+w/2,y-30,4,0,Math.PI*2);ctx.fill();
    // Windows
    for(let fy=y+80;fy<y+h-20;fy+=22)for(let fx=x+w/2-15;fx<=x+w/2+5;fx+=15){ctx.fillStyle='#ADD8E6';ctx.fillRect(fx,fy,8,14);}
    // Base building (Parliament)
    ctx.fillStyle='#C8B888';ctx.fillRect(x,y+h*0.4,w,h*0.6);ctx.strokeRect(x,y+h*0.4,w,h*0.6);
    for(let fy=y+h*0.45;fy<y+h-15;fy+=20)for(let fx=x+8;fx<x+w-8;fx+=14){ctx.fillStyle='#ADD8E6';ctx.fillRect(fx,fy,6,12);}
    ctx.fillStyle='#8B7355';ctx.font='bold 9px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('BIG BEN',x+w/2,y+h-5);ctx.textAlign='left';
};
drawFns.tower_bridge = function(x,y,w,h) {

        // Pointed tops

        for(let fy=y+15;fy<y+h-20;fy+=18){ctx.fillStyle='#ADD8E6';ctx.fillRect(tx+5,fy,12,10);}

drawFns.buckingham = function(x,y,w,h) {

    // Central portico
    ctx.fillStyle='#E0D8C0';ctx.fillRect(x+w/2-25,y+15,50,h-15);

// --- PARIS ---
drawFns.eiffel = function(x,y,w,h) {
    ctx.strokeStyle='#5C4033';ctx.lineWidth=3;
    // Four legs tapering to top
    const topX=x+w/2, topY=y-20;
    const baseL=x+w*0.15, baseR=x+w*0.85;
    // Left leg
    ctx.beginPath();ctx.moveTo(baseL,y+h);ctx.lineTo(topX-3,topY);ctx.stroke();
    // Right leg
    ctx.beginPath();ctx.moveTo(baseR,y+h);ctx.lineTo(topX+3,topY);ctx.stroke();
    // Cross beams
    const levels = [0.75, 0.5, 0.3];
    levels.forEach(pct => {
        const ly = y+h - (y+h-topY)*pct;
        const lx1 = baseL + (topX-3-baseL)*pct;
        const lx2 = baseR + (topX+3-baseR)*pct;
        ctx.fillStyle='#6B5040';ctx.fillRect(lx1,ly,lx2-lx1,4);
    });
    // Platform at first level
    const p1y = y+h-(y+h-topY)*0.3;
    const p1l = baseL+(topX-baseL)*0.3-5;
    const p1r = baseR+(topX-baseR)*0.3+5;
    ctx.fillStyle='#5C4033';ctx.fillRect(p1l,p1y-2,p1r-p1l,6);
    // Top antenna
    ctx.fillStyle='#5C4033';ctx.fillRect(topX-1,topY-15,2,15);
    // Arches at base
    ctx.fillStyle='rgba(92,64,51,0.3)';ctx.beginPath();ctx.arc(x+w/2,y+h,w*0.25,Math.PI,0);ctx.fill();
    ctx.fillStyle='#5C4033';ctx.font='bold 9px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('EIFFEL-TORONY',x+w/2,y+h-5);ctx.textAlign='left';
};
drawFns.notre_dame = function(x,y,w,h) {
    ctx.fillStyle='#D8D0C0';ctx.fillRect(x,y+30,w,h-30);ctx.strokeStyle='#A09080';ctx.lineWidth=2;ctx.strokeRect(x,y+30,w,h-30);
    // Two square towers
    for(const tx of [x+5,x+w-25]) {
        ctx.fillStyle='#C8C0B0';ctx.fillRect(tx,y,22,30);ctx.strokeRect(tx,y,22,30);
        // Battlements
        for(let bx=tx;bx<tx+22;bx+=6)ctx.fillRect(bx,y-5,4,5);
    }
    // Rose window
    ctx.fillStyle='#4169E1';ctx.beginPath();ctx.arc(x+w/2,y+50,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#A09080';ctx.stroke();
    // Spokes
    ctx.strokeStyle='#C8C0B0';ctx.lineWidth=1;for(let a=0;a<Math.PI*2;a+=Math.PI/4){ctx.beginPath();ctx.moveTo(x+w/2,y+50);ctx.lineTo(x+w/2+Math.cos(a)*11,y+50+Math.sin(a)*11);ctx.stroke();}
    // Pointed arches
    for(let fx=x+10;fx<x+w-10;fx+=18){ctx.fillStyle='#87CEEB';ctx.fillRect(fx,y+70,8,18);ctx.fillStyle='#C8C0B0';ctx.beginPath();ctx.moveTo(fx,y+70);ctx.lineTo(fx+4,y+64);ctx.lineTo(fx+8,y+70);ctx.fill();}
    // Flying buttresses hint
    ctx.strokeStyle='#B0A890';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+h*0.6);ctx.lineTo(x-10,y+h);ctx.stroke();ctx.beginPath();ctx.moveTo(x+w,y+h*0.6);ctx.lineTo(x+w+10,y+h);ctx.stroke();
    // Spire
    ctx.fillStyle='#8B7355';ctx.beginPath();ctx.moveTo(x+w/2-3,y+30);ctx.lineTo(x+w/2,y-15);ctx.lineTo(x+w/2+3,y+30);ctx.fill();
    ctx.fillStyle='#A09080';ctx.font='bold 8px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('NOTRE-DAME',x+w/2,y+h-5);ctx.textAlign='left';
};
drawFns.arc_triomphe = function(x,y,w,h) {
    ctx.fillStyle='#E0D8C8';ctx.fillRect(x,y+10,w,h-10);ctx.strokeStyle='#B0A890';ctx.lineWidth=2;ctx.strokeRect(x,y+10,w,h-10);
    // Attic (top section)
    ctx.fillStyle='#D0C8B8';ctx.fillRect(x,y+10,w,15);ctx.strokeRect(x,y+10,w,15);
    // Cornice
    ctx.fillStyle='#B0A890';ctx.fillRect(x-3,y+7,w+6,5);
    // Main arch
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+w/2,y+h,w*0.28,Math.PI,0);ctx.fill();

// --- VENICE ---
drawFns.rialto = function(x,y,w,h) {
    // Stone arch bridge
    ctx.fillStyle='#E0D0B8';
    // Arch
    ctx.beginPath();ctx.moveTo(x,y+h);ctx.quadraticCurveTo(x+w/2,y,x+w,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.fill();
    ctx.strokeStyle='#A09080';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y+h);ctx.quadraticCurveTo(x+w/2,y,x+w,y+h);ctx.stroke();
    // Colonnade on top
    const archTop = y + h*0.35;
    ctx.fillStyle='#D8C8B0';ctx.fillRect(x+w*0.15,archTop,w*0.7,h*0.2);
    for(let px=x+w*0.18;px<x+w*0.82;px+=12){ctx.fillStyle='#C0B098';ctx.fillRect(px,archTop,4,h*0.2);}
    // Railing
    ctx.fillStyle='#C0B098';ctx.fillRect(x+w*0.1,archTop-3,w*0.8,4);
    // Small arches
    for(let ax=x+15;ax<x+w-15;ax+=25){ctx.strokeStyle='#A09080';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ax+10,y+h,12,Math.PI,0);ctx.stroke();}
    ctx.fillStyle='#8B7355';ctx.font='bold 9px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('RIALTO',x+w/2,archTop+h*0.12);ctx.textAlign='left';
};
drawFns.san_marco = function(x,y,w,h) {
    // Byzantine basilica
    ctx.fillStyle='#F5ECD7';ctx.fillRect(x,y+40,w,h-40);ctx.strokeStyle='#C0A880';ctx.lineWidth=2;ctx.strokeRect(x,y+40,w,h-40);
    // Five domes
    const domes = [-0.35,-0.18,0,0.18,0.35];
    domes.forEach((d,i) => {
        const dx = x+w/2+d*w;
        const r = i===2 ? 22 : 15;
        const dy = i===2 ? y+25 : y+32;
        ctx.fillStyle='#BDB76B';ctx.beginPath();ctx.arc(dx,dy,r,Math.PI,0);ctx.fill();ctx.strokeStyle='#8B8640';ctx.stroke();
        // Cross on each dome
        ctx.fillStyle='#FFD700';ctx.fillRect(dx-1,dy-r-8,2,8);ctx.fillRect(dx-4,dy-r-5,8,2);
    });
    // Grand arches at entrance
    for(let ax=x+15;ax<x+w-15;ax+=w/5){ctx.fillStyle='#87CEEB';ctx.beginPath();ctx.arc(ax+w/10,y+h-20,w/10,Math.PI,0);ctx.fill();ctx.strokeStyle='#C0A880';ctx.stroke();}
    // Gothic details
    for(let fy=y+50;fy<y+h-25;fy+=22)for(let fx=x+10;fx<x+w-10;fx+=16){ctx.fillStyle='#87CEEB';ctx.fillRect(fx,fy,7,12);}
    // Horses (simplified gold rectangles)
    ctx.fillStyle='#DAA520';for(let hx=x+w*0.3;hx<x+w*0.7;hx+=15)ctx.fillRect(hx,y+38,8,10);
    ctx.fillStyle='#8B7355';ctx.font='bold 8px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('SAN MARCO',x+w/2,y+h-5);ctx.textAlign='left';
};
drawFns.campanile = function(x,y,w,h) {
    // Tall bell tower
    ctx.fillStyle='#E8C8A0';ctx.fillRect(x+w/2-12,y+30,24,h-30);ctx.strokeStyle='#B09070';ctx.lineWidth=2;ctx.strokeRect(x+w/2-12,y+30,24,h-30);
    // Belfry (top section with arches)
    ctx.fillStyle='#D8B888';ctx.fillRect(x+w/2-16,y+10,32,25);ctx.strokeRect(x+w/2-16,y+10,32,25);
    // Arched openings
    for(const side of [-8,4]){ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+w/2+side,y+28,5,Math.PI,0);ctx.fill();ctx.fillRect(x+w/2+side-5,y+28,10,7);}
    // Pyramid top
    ctx.fillStyle='#2E8B57';ctx.beginPath();ctx.moveTo(x+w/2-14,y+10);ctx.lineTo(x+w/2,y-20);ctx.lineTo(x+w/2+14,y+10);ctx.fill();ctx.strokeStyle='#1A6B3A';ctx.stroke();
    // Gold angel on top
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+w/2,y-20,4,0,Math.PI*2);ctx.fill();
    // Windows along tower
    for(let fy=y+40;fy<y+h-15;fy+=20){ctx.fillStyle='#87CEEB';ctx.fillRect(x+w/2-5,fy,10,10);}
    // Base wider section
    ctx.fillStyle='#D8B888';ctx.fillRect(x+w/2-18,y+h-15,36,15);
    ctx.fillStyle='#B09070';ctx.font='bold 8px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('CAMPANILE',x+w/2,y+h-3);ctx.textAlign='left';
};

// ==================== STREET / GROUND ====================
function drawStreetProp(prop){const x=prop.x-camera.x,y=GROUND_Y;switch(prop.type){case'lamp':ctx.fillStyle='#333';ctx.fillRect(x,y-55,3,55);ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+1,y-55,6,Math.PI,0);ctx.fill();ctx.fillStyle='rgba(255,255,150,0.2)';ctx.beginPath();ctx.arc(x+1,y-48,16,0,Math.PI*2);ctx.fill();break;case'bench':ctx.fillStyle='#8B4513';ctx.fillRect(x-12,y-14,28,4);ctx.fillRect(x-12,y-22,3,12);ctx.fillRect(x+13,y-22,3,12);ctx.fillRect(x-10,y-14,3,14);ctx.fillRect(x+10,y-14,3,14);break;case'tree':ctx.fillStyle='#654321';ctx.fillRect(x-3,y-45,8,45);ctx.fillStyle='#228B22';ctx.beginPath();ctx.arc(x+1,y-55,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2E8B2E';ctx.beginPath();ctx.arc(x-8,y-48,14,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+12,y-50,15,0,Math.PI*2);ctx.fill();break;case'bin':ctx.fillStyle='#555';ctx.fillRect(x-6,y-18,14,18);ctx.fillStyle='#666';ctx.fillRect(x-8,y-20,18,4);break;}}

function drawGround(tile,city){
    const x=tile.x-camera.x;
    const theme=CITY_THEMES[city]||CITY_THEMES.budapest;
    ctx.fillStyle=theme.ground1;ctx.fillRect(x,tile.y,tile.w,8);
    ctx.fillStyle=theme.ground2;ctx.fillRect(x,tile.y+7,tile.w,3);
    ctx.fillStyle=theme.ground3;ctx.fillRect(x,tile.y+10,tile.w,tile.h-10);
    ctx.strokeStyle='#7A7A7A';ctx.lineWidth=1;for(let lx=x;lx<x+tile.w;lx+=40){ctx.beginPath();ctx.moveTo(lx,tile.y);ctx.lineTo(lx,tile.y+8);ctx.stroke();}
}

function addParticle(x,y,color,count){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-0.5)*6,vy:-Math.random()*5-2,life:30+Math.random()*20,color,size:3+Math.random()*4});}
function addComboText(x,y,text){comboTexts.push({x,y,text,life:60,vy:-2});}

// ==================== UPDATE ====================
function update() {
    if (gameState!=='playing') return;
    if (screenShake>0) screenShake*=0.85;
    if (comboTimer>0){comboTimer--;if(comboTimer<=0)comboCount=0;}
    comboTexts.forEach(ct=>{ct.y+=ct.vy;ct.life--;});
    comboTexts=comboTexts.filter(ct=>ct.life>0);

    if(isLeft()){player.vx=-PLAYER_SPEED;player.facing=-1;}
    else if(isRight()){player.vx=PLAYER_SPEED;player.facing=1;}
    else player.vx*=0.8;

    if(isUp()&&player.onGround){player.vy=JUMP_FORCE;player.onGround=false;playSound('jump');}
    if(!player.onGround){if(isUp()){player.vy+=FLY_LIFT;if(player.vy<FLY_MAX_UP)player.vy=FLY_MAX_UP;player.isFlying=true;}else{player.vy+=GRAVITY;if(player.vy>FALL_SPEED)player.vy=FALL_SPEED;player.isFlying=false;}}else{player.isFlying=false;player.vy+=GRAVITY;}

    if(isPoop()&&player.poopCooldown<=0&&!player.onGround){
        poops.push({x:player.x+player.w/2-8,y:player.y+player.h,w:17,h:25,vy:POOP_SPEED,active:true});
        player.poopCooldown=POOP_COOLDOWN;playSound('poop');
    }
    if(player.poopCooldown>0)player.poopCooldown--;

    player.x+=player.vx;player.y+=player.vy;player.onGround=false;
    if(player.invincible>0)player.invincible--;player.animTimer++;
    player.wingTimer++;
    if(player.isFlying){if(player.wingTimer%5===0)player.wingFrame=(player.wingFrame+1)%3;}
    else if(!player.onGround){if(player.wingTimer%10===0)player.wingFrame=(player.wingFrame+1)%3;}

    for(const tile of groundTiles){if(player.x+player.w>tile.x+5&&player.x<tile.x+tile.w-5&&player.y+player.h>tile.y&&player.y+player.h<tile.y+20&&player.vy>=0){player.y=tile.y-player.h;player.vy=0;player.onGround=true;}}
    if(player.x<0)player.x=0;if(player.x>LEVEL_WIDTH-player.w)player.x=LEVEL_WIDTH-player.w;
    if(player.y<SKY_TOP){player.y=SKY_TOP;if(player.vy<0)player.vy=0;}
    if(player.y>CH+50)player.y=GROUND_Y-player.h;

    const targetCam=player.x-CW/3;camera.x+=(targetCam-camera.x)*0.08;
    if(camera.x<0)camera.x=0;if(camera.x>LEVEL_WIDTH-CW)camera.x=LEVEL_WIDTH-CW;
    clouds.forEach(c=>{c.x+=c.speed;if(c.x>LEVEL_WIDTH+150)c.x=-c.w-50;});

    seeds.forEach(s=>{if(s.collected)return;s.bobTimer+=0.05;const sy=s.y+Math.sin(s.bobTimer)*5;
        if(player.x+player.w>s.x&&player.x<s.x+s.w&&player.y+player.h>sy&&player.y<sy+s.h){s.collected=true;seedsCollected++;score+=100;addParticle(s.x+s.w/2,sy,'#FFD700',12);playSound('coin');}});

    sparrows.forEach(sp=>{if(!sp.alive){sp.deathTimer++;sp.vy=(sp.vy||0)+0.5;sp.y+=sp.vy;return;}
        sp.x+=sp.vx;sp.flyTimer+=0.04;sp.y=sp.startY+Math.sin(sp.flyTimer)*40;
        if(Math.abs(sp.x-sp.startX)>sp.patrol)sp.vx*=-1;sp.wingTimer++;if(sp.wingTimer%6===0)sp.wingFrame=(sp.wingFrame+1)%3;
        if(player.invincible>0)return;
        const ox=player.x+player.w>sp.x+6&&player.x<sp.x+sp.w-6;const oy=player.y+player.h>sp.y+6&&player.y<sp.y+sp.h-6;
        if(!ox||!oy)return;
        if(player.y+player.h<sp.y+sp.h*0.5&&player.vy>0){killEnemy(sp,'stomp');player.vy=JUMP_FORCE*0.6;return;}
        const pCX=player.x+player.w/2,sCX=sp.x+sp.w/2;const pSpd=Math.abs(player.vx);
        const mR=player.vx>0&&player.facing===1,mL=player.vx<0&&player.facing===-1;
        const pL=pCX<sCX,pR=pCX>sCX;const facing=(pL&&mR)||(pR&&mL);
        if(facing&&pSpd>=PECK_MIN_SPEED){killEnemy(sp,'peck');player.vx*=0.3;return;}
        playerHit();});

    humans.forEach(hu=>{if(!hu.alive){hu.deathTimer++;return;}hu.x+=hu.vx;if(Math.abs(hu.x-hu.startX)>hu.patrol)hu.vx*=-1;
        hu.shootTimer++;const dx=player.x-hu.x,dy=player.y-hu.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<450&&hu.shootTimer>=hu.shootCooldown&&!hu.isAiming){hu.isAiming=true;hu.aimTimer=25;}
        if(hu.isAiming){hu.aimTimer--;hu.vx=0;if(hu.aimTimer<=0){const angle=Math.atan2(player.y-hu.y-20,player.x+player.w/2-hu.x);const spd=4.5;
            bullets.push({x:hu.x+hu.w/2,y:hu.y+10,vx:Math.cos(angle)*spd,vy:Math.min(Math.sin(angle)*spd,-1.5),w:14,h:14,active:true,life:200});
            hu.shootTimer=0;hu.isAiming=false;hu.shootCooldown=70+Math.random()*70;playSound('sling');hu.vx=(0.4+Math.random()*0.6)*(Math.random()<0.5?1:-1);}}
        if(player.invincible<=0&&player.x+player.w>hu.x+5&&player.x<hu.x+hu.w-5&&player.y+player.h>hu.y+5&&player.y<hu.y+hu.h-5)playerHit();});

    bullets.forEach(b=>{if(!b.active)return;b.x+=b.vx;b.y+=b.vy;b.vy+=0.04;b.life--;
        if(b.life<=0||b.y>GROUND_Y||b.y<-50){b.active=false;return;}
        if(player.invincible<=0&&player.x+player.w>b.x&&player.x<b.x+b.w&&player.y+player.h>b.y&&player.y<b.y+b.h){b.active=false;playerHit();}});
    bullets=bullets.filter(b=>b.active);

    poops.forEach(p=>{if(!p.active)return;p.vy+=0.2;p.y+=p.vy;
        humans.forEach(hu=>{if(!hu.alive||!p.active)return;if(p.x+p.w>hu.x&&p.x<hu.x+hu.w&&p.y+p.h>hu.y&&p.y<hu.y+hu.h){killEnemy(hu,'poop');p.active=false;}});
        // Kaka átrepül a verében - őket csak csípni lehet!
        if(p.y>GROUND_Y){p.active=false;addParticle(p.x,GROUND_Y,'#654321',5);playSound('splat');}});

    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});
    particles=particles.filter(p=>p.life>0);poops=poops.filter(p=>p.active);
    if(seedsCollected>=seedsNeeded&&player.x>LEVEL_WIDTH-200){gameState='levelComplete';levelCompleteTimer=150;}
}

function killEnemy(en,method){en.alive=false;en.deathTimer=0;en.vy=-3;comboCount++;comboTimer=90;
    const m=Math.min(comboCount,5),earned=200*m;score+=earned;
    addParticle(en.x+en.w/2,en.y,method==='poop'?'#654321':method==='peck'?'#FFD700':'#FF6600',10);
    if(comboCount>1)addComboText(en.x+en.w/2,en.y-20,`x${m} COMBO! +${earned}`);
    if(method==='peck')addComboText(en.x+en.w/2,en.y-40,'CSÍP!');
    screenShake=method==='poop'?8:5;playSound(method==='peck'?'peck':method==='poop'?'splat':'stomp');}

function playerHit(){if(player.invincible>0)return;lives--;screenShake=12;
    addParticle(player.x+player.w/2,player.y+player.h/2,'#FF0000',15);playSound('hit');
    if(lives<=0){gameState='gameOver';deathTimer=0;}else{player.invincible=90;player.vy=JUMP_FORCE*0.8;}}

// ==================== DRAW ====================
function draw() {
    const city = getCityForLevel(currentLevel);
    const theme = CITY_THEMES[city] || CITY_THEMES.budapest;
    ctx.save();
    if(screenShake>0.5)ctx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*2);

    const grad=ctx.createLinearGradient(0,0,0,CH);
    grad.addColorStop(0,theme.skyTop);grad.addColorStop(0.5,theme.skyMid);grad.addColorStop(1,theme.skyBot);
    ctx.fillStyle=grad;ctx.fillRect(0,0,CW,CH);

    // Sun
    ctx.fillStyle='#FFE44D';ctx.beginPath();ctx.arc(CW-70,55,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,228,77,0.3)';ctx.beginPath();ctx.arc(CW-70,55,45,0,Math.PI*2);ctx.fill();
    for(let a=0;a<Math.PI*2;a+=Math.PI/8){ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(CW-70+Math.cos(a)*33,55+Math.sin(a)*33);ctx.lineTo(CW-70+Math.cos(a)*48,55+Math.sin(a)*48);ctx.stroke();}

    clouds.forEach(c=>{const cx=c.x-camera.x*0.2;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.ellipse(cx,c.y,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx-c.w*0.2,c.y+4,c.w*0.3,c.h*0.4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+c.w*0.25,c.y+2,c.w*0.35,c.h*0.45,0,0,Math.PI*2);ctx.fill();});

    // Water (if theme has it)
    if(theme.water){ctx.fillStyle=theme.waterColor;ctx.globalAlpha=0.5;ctx.fillRect(0,GROUND_Y-12,CW,17);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;for(let wx=0;wx<CW;wx+=25){ctx.beginPath();ctx.arc(wx+Math.sin(Date.now()/800+wx)*3,GROUND_Y-5,7,0,Math.PI);ctx.stroke();}ctx.globalAlpha=1;}

    farBuildings.forEach(fb=>{const fx=fb.x-camera.x*0.3;if(fx>-100&&fx<CW+100){ctx.fillStyle=fb.color;ctx.globalAlpha=0.35;ctx.fillRect(fx,fb.y,fb.w,fb.h);if(fb.windows){ctx.fillStyle='rgba(200,220,240,0.5)';for(let wy=fb.y+8;wy<fb.y+fb.h-8;wy+=16)for(let wx=fx+5;wx<fx+fb.w-5;wx+=12)ctx.fillRect(wx,wy,4,7);}ctx.globalAlpha=1;}});

    buildings.forEach(b=>{const bx2=b.x-camera.x*0.85;if(bx2>-b.w-60&&bx2<CW+60)drawBuilding({...b},camera.x*0.85);});

    streetProps.forEach(p=>{const px=p.x-camera.x;if(px>-50&&px<CW+50)drawStreetProp(p);});

    groundTiles.forEach(tile=>{const px=tile.x-camera.x;if(px>-100&&px<CW+100)drawGround(tile,city);});

    seeds.forEach(s=>{if(s.collected)return;const sx=s.x-camera.x;if(sx<-50||sx>CW+50)return;const sy=s.y+Math.sin(s.bobTimer)*5;
        ctx.fillStyle='rgba(255,215,0,0.25)';ctx.beginPath();ctx.arc(sx+s.w/2,sy+s.h/2,22,0,Math.PI*2);ctx.fill();
        if(imgs.sunflower_seed&&imgs.sunflower_seed.complete)ctx.drawImage(imgs.sunflower_seed,sx-8,sy-8,50,25);});

    sparrows.forEach(sp=>{if(!sp.alive&&sp.deathTimer>80)return;const sx=sp.x-camera.x;if(sx<-80||sx>CW+80)return;
        let sprKey=sp.alive?`sparrow_wing${sp.wingFrame}`:'sparrow_dead';const alpha=sp.alive?1:Math.max(0,1-sp.deathTimer/80);ctx.globalAlpha=alpha;
        if(imgs[sprKey]&&imgs[sprKey].complete){ctx.save();if(sp.vx<0){ctx.translate(sx+sp.w,sp.y);ctx.scale(-1,1);ctx.drawImage(imgs[sprKey],0,0,sp.w,sp.h);}else ctx.drawImage(imgs[sprKey],sx,sp.y,sp.w,sp.h);ctx.restore();}ctx.globalAlpha=1;});

    humans.forEach(hu=>{if(!hu.alive&&hu.deathTimer>80)return;const hx=hu.x-camera.x;if(hx<-80||hx>CW+80)return;
        const sprKey=hu.alive?'human':'human_dead';const alpha=hu.alive?1:Math.max(0,1-hu.deathTimer/80);ctx.globalAlpha=alpha;
        if(imgs[sprKey]&&imgs[sprKey].complete){ctx.save();const ld=hu.alive?(player.x>hu.x?1:-1):1;if(ld<0){ctx.translate(hx+hu.w,hu.y);ctx.scale(-1,1);ctx.drawImage(imgs[sprKey],0,0,hu.w,hu.h);}else ctx.drawImage(imgs[sprKey],hx,hu.y,hu.w,hu.h);ctx.restore();}ctx.globalAlpha=1;
        if(hu.alive&&hu.isAiming){ctx.strokeStyle='#FF0000';ctx.lineWidth=1;ctx.setLineDash([4,4]);const angle=Math.atan2(player.y-hu.y-20,player.x+player.w/2-hu.x);ctx.beginPath();ctx.moveTo(hx+hu.w/2,hu.y+10);ctx.lineTo(hx+hu.w/2+Math.cos(angle)*55,hu.y+10+Math.sin(angle)*55);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#FF0000';ctx.font='bold 20px "Comic Sans MS"';ctx.fillText('!',hx+hu.w/2-5,hu.y-10);}});

    bullets.forEach(b=>{const bx2=b.x-camera.x;if(imgs.bullet&&imgs.bullet.complete){ctx.save();ctx.translate(bx2+b.w/2,b.y+b.h/2);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.drawImage(imgs.bullet,-b.w/2,-b.h/2,b.w,b.h);ctx.restore();}
        ctx.fillStyle='rgba(150,150,150,0.4)';ctx.beginPath();ctx.arc(bx2+b.w/2-b.vx*3,b.y+b.h/2-b.vy*3,5,0,Math.PI*2);ctx.fill();});

    poops.forEach(p=>{const px=p.x-camera.x;if(imgs.poop&&imgs.poop.complete)ctx.drawImage(imgs.poop,px,p.y,p.w,p.h);
        ctx.fillStyle='rgba(101,67,33,0.3)';ctx.beginPath();ctx.arc(px+p.w/2,p.y-5,5,0,Math.PI*2);ctx.fill();});

    if(player.invincible<=0||Math.floor(player.invincible/3)%2===0){let sprKey='player';if(!player.onGround)sprKey=`player_wing${player.wingFrame}`;else if(Math.abs(player.vx)>1)sprKey=Math.floor(player.animTimer/8)%2===0?'player':'player_walk';if(gameState==='gameOver')sprKey='player_dead';
        if(imgs[sprKey]&&imgs[sprKey].complete){ctx.save();const px=player.x-camera.x;if(player.facing<0){ctx.translate(px+player.w,player.y);ctx.scale(-1,1);ctx.drawImage(imgs[sprKey],0,0,player.w,player.h);}else ctx.drawImage(imgs[sprKey],px,player.y,player.w,player.h);ctx.restore();}}

    particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/50;ctx.fillRect(p.x-camera.x,p.y,p.size,p.size);});ctx.globalAlpha=1;
    comboTexts.forEach(ct=>{ctx.fillStyle=ct.text==='CSÍP!'?'#FF6600':'#FFD700';ctx.font=ct.text==='CSÍP!'?'bold 24px "Comic Sans MS"':'bold 20px "Comic Sans MS"';ctx.textAlign='center';ctx.globalAlpha=ct.life/60;ctx.fillText(ct.text,ct.x-camera.x,ct.y);ctx.globalAlpha=1;ctx.textAlign='left';});

    // HUD
    ctx.fillStyle='rgba(0,0,0,0.65)';roundRect(ctx,10,8,220,100,8);ctx.fill();ctx.strokeStyle='#FFD700';ctx.lineWidth=2;roundRect(ctx,10,8,220,100,8);ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.font='bold 17px "Comic Sans MS"';ctx.fillText('Pontszám: '+score,22,32);
    ctx.fillText('Élet: ',22,56);for(let i=0;i<lives;i++)if(imgs.player&&imgs.player.complete)ctx.drawImage(imgs.player,75+i*28,38,22,24);
    ctx.fillStyle=seedsCollected>=seedsNeeded?'#00FF00':'#FFD700';ctx.fillText('Szotyi: '+seedsCollected+'/'+totalSeeds+' (kell: '+seedsNeeded+')',22,80);
    // Poop cooldown bar
    ctx.fillStyle='#FFD700';ctx.fillText('Kaka: ',22,98);const poopReady=player.poopCooldown<=0;const poopPct=poopReady?1:1-player.poopCooldown/POOP_COOLDOWN;
    ctx.fillStyle='#333';ctx.fillRect(82,88,120,12);ctx.fillStyle=poopReady?'#8B4513':'#654321';ctx.fillRect(82,88,120*poopPct,12);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;ctx.strokeRect(82,88,120,12);
    if(poopReady){ctx.fillStyle='#FFF';ctx.font='bold 10px "Comic Sans MS"';ctx.fillText('KÉSZ!',120,99);}

    const levelName=LEVEL_NAMES[currentLevel]||('Pálya '+(currentLevel+1));
    ctx.fillStyle='rgba(0,0,0,0.65)';roundRect(ctx,CW-260,8,250,32,8);ctx.fill();ctx.strokeStyle='#FFD700';roundRect(ctx,CW-260,8,250,32,8);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 15px "Comic Sans MS"';ctx.fillText((currentLevel+1)+'. pálya: '+levelName,CW-250,30);

    if(seedsCollected>=seedsNeeded){ctx.fillStyle='#00FF00';ctx.font='bold 16px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('>>> Repülj jobbra a célba! >>>',CW/2,28);ctx.textAlign='left';}

    const flagX=LEVEL_WIDTH-100-camera.x;
    if(flagX>-50&&flagX<CW+50){ctx.fillStyle='#8B4513';ctx.fillRect(flagX,GROUND_Y-120,5,120);ctx.fillStyle=seedsCollected>=seedsNeeded?'#00FF00':'#FF4444';ctx.beginPath();ctx.moveTo(flagX+5,GROUND_Y-120);ctx.lineTo(flagX+45,GROUND_Y-105);ctx.lineTo(flagX+5,GROUND_Y-90);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 11px "Comic Sans MS"';ctx.fillText('CÉL',flagX+12,GROUND_Y-101);}

    ctx.restore();
    if(gameState==='menu')drawMenu();else if(gameState==='levelComplete')drawLevelComplete();else if(gameState==='gameOver')drawGameOver();else if(gameState==='win')drawWin();
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function drawMenu(){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#FFD700';ctx.font='bold 44px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('Széncinege Kaland',CW/2,80);
    ctx.fillStyle='#87CEEB';ctx.font='bold 26px "Comic Sans MS"';ctx.fillText('Budapest · London · Párizs · Velence',CW/2,115);
    if(imgs.player&&imgs.player.complete)ctx.drawImage(imgs.player,CW/2-45,125,90,140);
    ctx.fillStyle='#fff';ctx.font='15px "Comic Sans MS"';
    if(isMobile){
        ['Bal/Jobb gomb  —  Mozgás','Fel gomb  —  Ugrás + Repülés (tartsd nyomva!)','💩 gomb  —  Kakálás a levegőbe (3 mp töltés!)','','Verebek:  Ugorj rájuk vagy csípd meg szemből, gyorsan!','Emberek:  Csúzlival lőnek — kakáld le őket!','A szotyikat az ellenségek őrzik — gyűjts össze legalább 3-at!']
        .forEach((l,i)=>ctx.fillText(l,CW/2,290+i*22));
        ctx.fillStyle='#FFD700';ctx.font='bold 22px "Comic Sans MS"';ctx.globalAlpha=0.7+Math.sin(Date.now()/300)*0.3;ctx.fillText('Érintsd meg a képernyőt!',CW/2,490);ctx.globalAlpha=1;
    } else {
        ['Nyilak / WASD  —  Mozgás és ugrás','Felső nyíl tartva  —  Repülés (elengedve lefelé száll)','SPACE  —  Kakálás a levegőbe (3 mp töltés!)','','Verebek:  Ugorj rájuk vagy csípd meg szemből, gyorsan!','Emberek:  Csúzlival lőnek — kakáld le őket!','A szotyikat az ellenségek őrzik — gyűjts össze legalább 3-at!']
        .forEach((l,i)=>ctx.fillText(l,CW/2,290+i*22));
        ctx.fillStyle='#FFD700';ctx.font='bold 22px "Comic Sans MS"';ctx.globalAlpha=0.7+Math.sin(Date.now()/300)*0.3;ctx.fillText('Nyomj ENTER-t vagy SPACE-t!',CW/2,490);ctx.globalAlpha=1;
    }
    ctx.textAlign='left';
}

function drawLevelComplete(){levelCompleteTimer--;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#00FF00';ctx.font='bold 42px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('Pálya teljesítve!',CW/2,CH/2-40);
    ctx.fillStyle='#FFD700';ctx.font='24px "Comic Sans MS"';ctx.fillText('Szotyi: '+seedsCollected+'/'+totalSeeds,CW/2,CH/2+10);ctx.fillText('Pontszám: '+score,CW/2,CH/2+45);ctx.textAlign='left';
    if(levelCompleteTimer<=0){currentLevel++;if(currentLevel>=LEVEL_NAMES.length)gameState='win';else{generateLevel(currentLevel);gameState='playing';}}}

function drawGameOver(){deathTimer++;ctx.fillStyle='rgba(80,0,0,0.75)';ctx.fillRect(0,0,CW,CH);
    if(imgs.player_dead&&imgs.player_dead.complete)ctx.drawImage(imgs.player_dead,CW/2-45,CH/2-130,90,140);
    ctx.fillStyle='#FF4444';ctx.font='bold 48px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('Játék vége!',CW/2,CH/2+40);
    ctx.fillStyle='#FFD700';ctx.font='24px "Comic Sans MS"';ctx.fillText('Pontszám: '+score,CW/2,CH/2+80);
    if(deathTimer>60){ctx.fillStyle='#fff';ctx.fillText(isMobile?'Érintsd meg a képernyőt!':'Nyomj ENTER-t az újrakezdéshez!',CW/2,CH/2+120);}ctx.textAlign='left';}

function drawWin(){ctx.fillStyle='rgba(0,40,0,0.8)';ctx.fillRect(0,0,CW,CH);
    for(let i=0;i<30;i++){ctx.fillStyle=['#FFD700','#FF6347','#00FF00','#FF69B4','#00BFFF'][i%5];ctx.fillRect((Math.sin(Date.now()/500+i*73)+1)/2*CW,(Date.now()/10+i*47)%CH,6,6);}
    if(imgs.player&&imgs.player.complete)ctx.drawImage(imgs.player,CW/2-55,CH/2-180,110,170);
    ctx.fillStyle='#FFD700';ctx.font='bold 48px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('GYŐZELEM!',CW/2,CH/2+30);
    ctx.fillStyle='#fff';ctx.font='24px "Comic Sans MS"';ctx.fillText('Európa megmentve a szotyi-tolvajoktól!',CW/2,CH/2+70);
    ctx.fillStyle='#FFD700';ctx.font='22px "Comic Sans MS"';ctx.fillText('Végső pontszám: '+score,CW/2,CH/2+110);
    ctx.fillText(isMobile?'Érintsd meg a képernyőt!':'Nyomj ENTER-t az újrakezdéshez!',CW/2,CH/2+145);ctx.textAlign='left';}

function handleMenuInput(){
    if(gameState==='menu'){gameState='playing';currentLevel=0;score=0;lives=3;generateLevel(0);audioCtx.resume();}
    else if(gameState==='gameOver'&&deathTimer>60){gameState='playing';score=0;lives=3;generateLevel(currentLevel);}
    else if(gameState==='win'){gameState='menu';currentLevel=0;score=0;lives=3;generateLevel(0);}}

generateLevel(0);
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
function waitAndStart(){if(imgsLoaded>=imgKeys.length)gameLoop();else setTimeout(waitAndStart,50);}
waitAndStart();
</script>
</body>
