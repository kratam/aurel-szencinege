// ===== AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);const n=AC.currentTime;switch(t){case'jump':o.type='square';o.frequency.setValueAtTime(300,n);o.frequency.linearRampToValueAtTime(600,n+.1);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.15);o.start(n);o.stop(n+.15);break;case'poop':o.type='sawtooth';o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(80,n+.25);g.gain.setValueAtTime(.1,n);g.gain.linearRampToValueAtTime(0,n+.3);o.start(n);o.stop(n+.3);break;case'splat':o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(50,n+.2);g.gain.setValueAtTime(.15,n);g.gain.linearRampToValueAtTime(0,n+.25);o.start(n);o.stop(n+.25);break;case'coin':o.type='square';o.frequency.setValueAtTime(800,n);o.frequency.setValueAtTime(1200,n+.08);g.gain.setValueAtTime(.1,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2);break;case'hit':o.type='square';o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(80,n+.15);g.gain.setValueAtTime(.15,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2);break;case'stomp':o.type='triangle';o.frequency.setValueAtTime(500,n);o.frequency.linearRampToValueAtTime(100,n+.12);g.gain.setValueAtTime(.15,n);g.gain.linearRampToValueAtTime(0,n+.15);o.start(n);o.stop(n+.15);break;case'sling':o.type='triangle';o.frequency.setValueAtTime(150,n);o.frequency.linearRampToValueAtTime(300,n+.05);o.frequency.linearRampToValueAtTime(100,n+.15);g.gain.setValueAtTime(.08,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2);break;case'powerup':o.type='square';o.frequency.setValueAtTime(400,n);o.frequency.setValueAtTime(600,n+.1);o.frequency.setValueAtTime(800,n+.2);g.gain.setValueAtTime(.1,n);g.gain.linearRampToValueAtTime(0,n+.3);o.start(n);o.stop(n+.3);break;case'boss':o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.linearRampToValueAtTime(50,n+.3);g.gain.setValueAtTime(.2,n);g.gain.linearRampToValueAtTime(0,n+.4);o.start(n);o.stop(n+.4);break;case'zap':o.type='sawtooth';o.frequency.setValueAtTime(800,n);o.frequency.linearRampToValueAtTime(200,n+.1);o.frequency.linearRampToValueAtTime(600,n+.15);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2);break;case'train':o.type='sawtooth';o.frequency.setValueAtTime(80,n);g.gain.setValueAtTime(.15,n);g.gain.linearRampToValueAtTime(0,n+.5);o.start(n);o.stop(n+.5);break}}catch(e){}}

// ===== INPUT =====
const keys={};
const touchState={left:false,right:false,up:false,poop:false};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();if(e.code==='Enter'||e.code==='Space')menuInput()});
window.addEventListener('keyup',e=>{keys[e.code]=false});

// Touch controls
function setupTouch(id,key){
const el=document.getElementById(id);
if(!el)return;
el.addEventListener('touchstart',e=>{e.preventDefault();touchState[key]=true;AC.resume();if(key==='poop')menuInput()});
el.addEventListener('touchend',e=>{e.preventDefault();touchState[key]=false});
el.addEventListener('touchcancel',e=>{touchState[key]=false});
}
setupTouch('btn-left','left');
setupTouch('btn-right','right');
setupTouch('btn-up','up');
setupTouch('btn-poop','poop');

// Also handle tap on canvas for menu
canvas.addEventListener('touchstart',e=>{AC.resume();if(gs==='menu'||gs==='gameOver'||gs==='win')menuInput()});

function isDown(action){
switch(action){
case'left':return keys['ArrowLeft']||keys['KeyA']||touchState.left;
case'right':return keys['ArrowRight']||keys['KeyD']||touchState.right;
case'up':return keys['ArrowUp']||keys['KeyW']||touchState.up;
case'poop':return keys['Space']||touchState.poop;
}return false}

{name:"Velence",sub:"Szent Márk tér, Rialto híd",bg1:'#5A8AC0',bg2:'#A0C8E0',groundCol:'#B0A898',sparrows:6,humans:4,bulletSpd:3.5,bulletCd:[65,125],landmarks:['sanmarco','rialto','venice_palace','campanile'],hazards:['gondola','lowbridge']},
{name:"New York",sub:"Szabadság-szobor, Empire State",bg1:'#4A6A9A',bg2:'#8AAAC8',groundCol:'#808080',sparrows:7,humans:4,bulletSpd:4,bulletCd:[60,120],landmarks:['statue_liberty','empire_state','brooklyn_bridge','chrysler'],hazards:['crane']},
{name:"Tokió",sub:"Tokió Tower, Senso-ji",bg1:'#D08080',bg2:'#FFD0D0',groundCol:'#A0A0A0',sparrows:7,humans:5,bulletSpd:4,bulletCd:[55,110],landmarks:['tokyo_tower','sensoji','shibuya','skytree'],hazards:['wire','train']},
{name:"Isztambul",sub:"Hagia Sophia, Kék mecset",bg1:'#6090B0',bg2:'#D0C8B0',groundCol:'#C0A880',sparrows:8,humans:5,bulletSpd:4.5,bulletCd:[50,100],landmarks:['hagia_sophia','blue_mosque','galata','grand_bazaar'],hazards:['narrowpass']},
{name:"Sydney",sub:"Operaház, Harbour Bridge",bg1:'#4AA0D9',bg2:'#90D8F0',groundCol:'#C8C0A0',sparrows:9,humans:6,bulletSpd:5,bulletCd:[45,90],landmarks:['sydney_opera','harbour_bridge','sydney_tower','bondi'],hazards:['crane','fountain']},
];
const LVLW=5600;

// ===== GAME STATE =====
let gs='menu',curLvl=0,score=0,lives=3,seedsC=0,seedsN=3,seedsT=5;
let cam={x:0},deathT=0,lvlCompT=0,shake=0,combo=0,comboT=0;
let respawnX=100,respawnY=GY-120;
let comboTxts=[],particles=[],floatTxts=[];
let highScores=JSON.parse(localStorage.getItem('szencinege_hs')||'[]');

// Player
let P={x:100,y:300,w:70,h:110,vx:0,vy:0,onG:false,fly:false,face:1,anim:0,inv:0,poopCd:0,wf:0,wt:0};
let plats=[],blds=[],farBlds=[],sparrows=[],humans=[],seeds=[],poops=[],bullets=[];
let clouds=[],streetProps=[],hazards=[],powerups=[];
let boss=null,bossActive=false;

// ===== DRAWING HELPERS =====
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}
function addP(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:-Math.random()*5-2,life:30+Math.random()*20,color:col,size:3+Math.random()*4})}
function addCT(x,y,t){comboTxts.push({x,y,text:t,life:60,vy:-2})}
function addFT(x,y,t,col='#FFD700',sz=24){floatTxts.push({x,y,text:t,life:50,vy:-1.5,col,sz})}

// ===== GENERATE LEVEL =====
function genClouds(){clouds=[];for(let i=0;i<20;i++)clouds.push({x:Math.random()*LVLW,y:15+Math.random()*100,w:50+Math.random()*90,h:20+Math.random()*25,spd:.15+Math.random()*.4})}

function genLevel(lv){
const L=LEVELS[lv];
plats=[];blds=[];farBlds=[];sparrows=[];humans=[];seeds=[];poops=[];bullets=[];
particles=[];streetProps=[];hazards=[];powerups=[];comboTxts=[];floatTxts=[];
seedsC=0;combo=0;comboT=0;boss=null;bossActive=false;
respawnX=100;respawnY=GY-P.h-10;

// Ground
for(let x=0;x<LVLW;x+=80)plats.push({x,y:GY,w:80,h:60,type:'ground'});

// Far buildings
for(let x=-200;x<LVLW+200;x+=60+Math.random()*40){
const bh=100+Math.random()*200;
farBlds.push({x,y:GY-bh,w:50+Math.random()*60,h:bh,
color:['#8899AA','#99AABB','#778899','#AABBCC','#889988'][Math.floor(Math.random()*5)],windows:Math.random()>.3})}

// Main buildings with landmarks
let bx=80;
const lmPos=L.landmarks.map((_,i)=>Math.floor(((i+0.5)/L.landmarks.length)*LVLW*.8+LVLW*.1));
let li=0;
while(bx<LVLW-100){
let bt,bw,bh;
if(li<lmPos.length&&bx>=lmPos[li]-50){bt=L.landmarks[li];li++;bw=160+Math.random()*60;bh=180+Math.random()*80}
else{bt=['berhaz','berhaz2','berhaz3','berhaz4','berhaz5'][Math.floor(Math.random()*5)];bw=70+Math.random()*60;bh=90+Math.random()*140}
const by=GY-bh;
blds.push({x:bx,y:by,w:bw,h:bh,type:bt});
const gap=5+Math.random()*25;bx+=bw+gap}

// Street props
for(let sx=150;sx<LVLW-150;sx+=120+Math.random()*100){
const pt=Math.random();
streetProps.push({x:sx,type:pt<.3?'lamp':pt<.55?'bench':pt<.75?'tree':'bin'})}

// Sparrows (NEAR seeds)
const seedPositions=[];
for(let i=0;i<seedsT;i++){
const sx=400+(i/seedsT)*(LVLW-800)+Math.random()*80;
const sy=80+Math.random()*200;
seeds.push({x:sx,y:sy,w:35,h:20,collected:false,bob:Math.random()*Math.PI*2});
seedPositions.push({x:sx,y:sy})}

// Sparrows near seeds
for(let i=0;i<L.sparrows;i++){
const si=i%seedPositions.length;
const sp=seedPositions[si];
const ox=(Math.random()-.5)*200;
sparrows.push({x:sp.x+ox,y:sp.y+Math.random()*60-30,w:55,h:40,vx:(1.5+Math.random()*1.5)*(Math.random()<.5?1:-1),vy:0,alive:true,deathT:0,
startX:sp.x+ox,startY:sp.y+Math.random()*60-30,patrol:100+Math.random()*80,
flyT:Math.random()*Math.PI*2,wf:0,wt:0})}

// Humans near seeds (on ground)
for(let i=0;i<L.humans;i++){
const si=i%seedPositions.length;
const sp=seedPositions[si];
humans.push({x:sp.x+Math.random()*100-50,y:GY-80,w:40,h:80,
vx:(.4+Math.random()*.6)*(Math.random()<.5?1:-1),alive:true,deathT:0,
startX:sp.x+Math.random()*100-50,patrol:80+Math.random()*60,
shootCd:L.bulletCd[0]+Math.random()*(L.bulletCd[1]-L.bulletCd[0]),shootT:0,
isAim:false,aimT:0,bSpd:L.bulletSpd})}

// Hazards
if(L.hazards.includes('fountain')){
for(let i=0;i<3;i++){
const fx=800+Math.random()*(LVLW-1600);
hazards.push({type:'fountain',x:fx,y:GY,w:40,h:80,timer:0,active:true})}}
if(L.hazards.includes('wire')){
for(let i=0;i<4;i++){
const wx=600+i*(LVLW-1200)/3;
hazards.push({type:'wire',x:wx,y:100+Math.random()*100,w:200,h:8,timer:0,zapT:0})}}
if(L.hazards.includes('train')){
hazards.push({type:'train',x:-300,y:GY-45,w:250,h:40,vx:0,timer:200+Math.random()*300,active:false,warned:false})}
if(L.hazards.includes('gondola')){
for(let i=0;i<3;i++){
hazards.push({type:'gondola',x:500+i*1500,y:GY-15,w:80,h:20,vx:.5+Math.random(),startX:500+i*1500,range:200})}}
if(L.hazards.includes('lowbridge')){
for(let i=0;i<3;i++){
const lx=800+i*1400;
hazards.push({type:'lowbridge',x:lx,y:GY-90,w:150,h:15})}}
if(L.hazards.includes('crane')){
for(let i=0;i<2;i++){
hazards.push({type:'crane',x:1000+i*2000,y:30,w:10,h:GY-30,dropT:0,dropX:0,dropping:false,dropY:0})}}
if(L.hazards.includes('rain')){hazards.push({type:'rain',drops:[]})}
if(L.hazards.includes('narrowpass')){
for(let i=0;i<3;i++){
const nx=700+i*1500;
hazards.push({type:'narrowpass',x:nx,y:GY-200,w:80,topH:130,botH:0})}}

// Power-ups (1-2 per level)
const puTypes=['coffee','magnet','double'];
for(let i=0;i<2;i++){
const px=800+Math.random()*(LVLW-1600);
powerups.push({x:px,y:100+Math.random()*150,w:25,h:25,type:puTypes[Math.floor(Math.random()*3)],
collected:false,bob:Math.random()*Math.PI*2})}

// Boss every 3rd level (level index 2,5,8)
if((lv+1)%3===0){
const bossNames={2:'Galamb',5:'Varjú',8:'Holló'};
const bossHP={2:5,5:7,8:10};
boss={x:LVLW-400,y:100,w:100,h:80,hp:bossHP[lv]||5,maxHp:bossHP[lv]||5,
name:bossNames[lv]||'Boss',vx:2,vy:0,startX:LVLW-500,startY:100,
patrol:200,flyT:0,attackT:0,alive:true,phase:0,flash:0};
bossActive=false}

// Player reset
P.x=respawnX;P.y=respawnY;P.vx=0;P.vy=0;P.onG=false;P.fly=false;P.inv=60;P.poopCd=0;P.wf=0;P.wt=0;
cam.x=0;genClouds()}

// ===== POWERUP STATE =====
let puState={coffee:0,magnet:0,double:0};

// ===== UPDATE =====
function update(){
if(gs!=='playing')return;
if(shake>0)shake*=.85;
if(comboT>0){comboT--;if(comboT<=0)combo=0}
comboTxts.forEach(c=>{c.y+=c.vy;c.life--});comboTxts=comboTxts.filter(c=>c.life>0);
floatTxts.forEach(f=>{f.y+=f.vy;f.life--});floatTxts=floatTxts.filter(f=>f.life>0);

// Powerup timers
for(const k in puState)if(puState[k]>0)puState[k]--;

const spd=puState.coffee>0?PSPEED*1.5:PSPEED;

// Player movement
if(isDown('left')){P.vx=-spd;P.face=-1}
else if(isDown('right')){P.vx=spd;P.face=1}
else P.vx*=.8;

if(isDown('up')&&P.onG){P.vy=JFORCE;P.onG=false;snd('jump')}

if(!P.onG){
if(isDown('up')){P.vy+=FLYLIFT;if(P.vy<FLYMAXUP)P.vy=FLYMAXUP;P.fly=true}
else{P.vy+=GRAV*0.6;if(P.vy>FLYFALL)P.vy=FLYFALL;P.fly=P.vy<0}
}else{P.fly=false;P.vy+=GRAV}

// Poop (3 sec cooldown = 180 frames)
if(isDown('poop')&&P.poopCd<=0&&!P.onG){
const cnt=puState.double>0?2:1;
for(let i=0;i<cnt;i++){
poops.push({x:P.x+P.w/2-8+(i*20-cnt*5),y:P.y+P.h,w:17,h:25,vy:POOPSPD,active:true})}
P.poopCd=180;snd('poop')}
if(P.poopCd>0)P.poopCd--;

P.x+=P.vx;P.y+=P.vy;P.onG=false;
if(P.inv>0)P.inv--;
P.anim++;
P.wt++;
if(P.fly){if(P.wt%5===0)P.wf=(P.wf+1)%3}
else if(!P.onG){if(P.wt%10===0)P.wf=(P.wf+1)%3}

// Platform collision
for(const pl of plats){
if(P.x+P.w>pl.x+5&&P.x<pl.x+pl.w-5&&P.y+P.h>pl.y&&P.y+P.h<pl.y+20&&P.vy>=0){
P.y=pl.y-P.h;P.vy=0;P.onG=true}}

// Bounds
if(P.x<0)P.x=0;
if(P.x>LVLW-P.w)P.x=LVLW-P.w;
if(P.y<0){P.y=0;P.vy=0}  // felső határ
if(P.y>CH+100){P.y=respawnY;P.x=respawnX}

// Checkpoint at halfway
if(P.x>LVLW/2&&respawnX<LVLW/2){respawnX=P.x;respawnY=P.y}

// Camera
const tc=P.x-CW/3;cam.x+=(tc-cam.x)*.08;
if(cam.x<0)cam.x=0;if(cam.x>LVLW-CW)cam.x=LVLW-CW;

// Clouds
clouds.forEach(c=>{c.x+=c.spd;if(c.x>LVLW+150)c.x=-c.w-50});

// Magnet pull seeds
if(puState.magnet>0){
seeds.forEach(s=>{if(s.collected)return;
const dx=P.x+P.w/2-s.x,dy=P.y+P.h/2-s.y,d=Math.sqrt(dx*dx+dy*dy);
if(d<200){s.x+=dx/d*3;s.y+=dy/d*3}})}

// Seeds
seeds.forEach(s=>{if(s.collected)return;s.bob+=.05;
const sy=s.y+Math.sin(s.bob)*5;
if(P.x+P.w>s.x&&P.x<s.x+s.w&&P.y+P.h>sy&&P.y<sy+s.h){
s.collected=true;seedsC++;score+=100;addP(s.x+s.w/2,sy,'#FFD700',12);
addFT(s.x,sy-20,'+100 Szotyi!');snd('coin')}});

// Sparrows
sparrows.forEach(sp=>{
if(!sp.alive){sp.deathT++;sp.vy+=.5;sp.y+=sp.vy;return}
sp.x+=sp.vx;sp.flyT+=.04;sp.y=sp.startY+Math.sin(sp.flyT)*40;
if(Math.abs(sp.x-sp.startX)>sp.patrol)sp.vx*=-1;
sp.wt++;if(sp.wt%6===0)sp.wf=(sp.wf+1)%3;

// Sparrow hitbox
const spHB={x:sp.x+8,y:sp.y+6,w:sp.w-16,h:sp.h-10};
const overlap=P.x+P.w>spHB.x&&P.x<spHB.x+spHB.w&&P.y+P.h>spHB.y&&P.y<spHB.y+spHB.h;
if(!overlap){/* no hit */}
// Stomp from above
else if(P.vy>0&&P.y+P.h<spHB.y+spHB.h*0.6){
killE(sp,'stomp');P.vy=JFORCE*.6}
// Front attack: facing sparrow & moving towards it (loose - any forward speed)
else if((P.face>0&&P.vx>0.3&&P.x+P.w<spHB.x+spHB.w*0.75)||
(P.face<0&&P.vx<-0.3&&P.x>spHB.x+spHB.w*0.25)){
killE(sp,'stomp');P.vx*=.3}
// Otherwise sparrow hurts us
else if(P.inv<=0){
playerHit()}});

// Humans
const L=LEVELS[curLvl];
humans.forEach(hu=>{
if(!hu.alive){hu.deathT++;return}
hu.x+=hu.vx;if(Math.abs(hu.x-hu.startX)>hu.patrol)hu.vx*=-1;
hu.shootT++;
const dx=P.x-hu.x,dy=P.y-hu.y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<450&&hu.shootT>=hu.shootCd&&!hu.isAim){hu.isAim=true;hu.aimT=30}
if(hu.isAim){hu.aimT--;hu.vx=0;
if(hu.aimT<=0){
const a=Math.atan2(P.y+P.h/2-hu.y-20,P.x+P.w/2-hu.x);
// Lő felfelé is - minimum szög
const minAngle=Math.min(a,-0.3);
bullets.push({x:hu.x+hu.w/2,y:hu.y+15,vx:Math.cos(minAngle)*hu.bSpd,vy:Math.sin(minAngle)*hu.bSpd,w:14,h:14,active:true,life:240});
hu.shootT=0;hu.isAim=false;hu.shootCd=L.bulletCd[0]+Math.random()*(L.bulletCd[1]-L.bulletCd[0]);
snd('sling');hu.vx=(.4+Math.random()*.6)*(Math.random()<.5?1:-1)}}
if(P.inv<=0&&P.x+P.w>hu.x+5&&P.x<hu.x+hu.w-5&&P.y+P.h>hu.y+5&&P.y<hu.y+hu.h-5)playerHit()});

// Bullets
bullets.forEach(b=>{if(!b.active)return;b.x+=b.vx;b.y+=b.vy;b.vy+=.02;b.life--;
if(b.life<=0){b.active=false;return}
if(P.inv<=0&&P.x+P.w>b.x&&P.x<b.x+b.w&&P.y+P.h>b.y&&P.y<b.y+b.h){b.active=false;playerHit()}
if(b.y>GY){b.active=false;addP(b.x,b.y,'#888',3)}});
bullets=bullets.filter(b=>b.active);

// Poops (ONLY hit humans, NOT sparrows)
poops.forEach(p=>{if(!p.active)return;p.vy+=.2;p.y+=p.vy;
humans.forEach(hu=>{if(!hu.alive||!p.active)return;
if(p.x+p.w>hu.x&&p.x<hu.x+hu.w&&p.y+p.h>hu.y&&p.y<hu.y+hu.h){killE(hu,'poop');p.active=false}});
// Boss hit
if(boss&&boss.alive&&bossActive&&p.active){
if(p.x+p.w>boss.x&&p.x<boss.x+boss.w&&p.y+p.h>boss.y&&p.y<boss.y+boss.h){
boss.hp--;boss.flash=10;p.active=false;addP(boss.x+boss.w/2,boss.y,'#FF0',8);snd('splat');
if(boss.hp<=0){boss.alive=false;score+=1000;addFT(boss.x,boss.y-30,'+1000 Boss!','#FF4444',32);snd('boss')}}}
if(p.y>CH+50)p.active=false;
plats.forEach(pl=>{if(p.active&&p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y<pl.y+pl.h){p.active=false;addP(p.x,p.y,'#654321',5);snd('splat')}})});

// Hazards
hazards.forEach(hz=>{
switch(hz.type){
case'fountain':
hz.timer++;
if(hz.timer%120<60){hz.active=true;
if(P.x+P.w>hz.x-10&&P.x<hz.x+hz.w+10&&P.y+P.h>hz.y-hz.h&&P.y<hz.y){P.vy=-6;addP(hz.x+hz.w/2,P.y,'#6AF',4)}}
else hz.active=false;break;
case'wire':
hz.zapT++;
if(hz.zapT%90<10){
if(P.x+P.w>hz.x&&P.x<hz.x+hz.w&&P.y+P.h>hz.y-5&&P.y<hz.y+hz.h+5&&P.inv<=0){playerHit();snd('zap')}}break;
case'train':
hz.timer--;
if(hz.timer<=0&&!hz.active){hz.active=true;hz.x=-hz.w;hz.vx=8+curLvl;hz.warned=false;snd('train')}
if(hz.active){
if(!hz.warned&&hz.x>-hz.w-100){hz.warned=true}
hz.x+=hz.vx;
if(P.x+P.w>hz.x+10&&P.x<hz.x+hz.w-10&&P.y+P.h>hz.y&&P.y<hz.y+hz.h&&P.inv<=0)playerHit();
if(hz.x>LVLW+100){hz.active=false;hz.timer=200+Math.random()*300}}break;
case'gondola':
hz.x+=hz.vx;if(Math.abs(hz.x-hz.startX)>hz.range)hz.vx*=-1;break;
case'lowbridge':
if(P.x+P.w>hz.x&&P.x<hz.x+hz.w&&P.y<hz.y+hz.h&&P.y+P.h>hz.y&&P.vy<0){P.vy=2;P.y=hz.y+hz.h}break;
case'crane':
hz.dropT++;
if(hz.dropT>300&&!hz.dropping){hz.dropping=true;hz.dropX=hz.x+Math.random()*40-20;hz.dropY=30}
if(hz.dropping){hz.dropY+=4;
if(P.x+P.w>hz.dropX-10&&P.x<hz.dropX+20&&P.y<hz.dropY+20&&P.y+P.h>hz.dropY&&P.inv<=0)playerHit();
if(hz.dropY>GY){hz.dropping=false;hz.dropT=0;addP(hz.dropX,GY,'#888',8)}}break;
case'rain':
if(!hz.drops.length)for(let i=0;i<30;i++)hz.drops.push({x:Math.random()*LVLW,y:Math.random()*CH,spd:3+Math.random()*4});
hz.drops.forEach(d=>{d.y+=d.spd;d.x-=1;if(d.y>CH){d.y=-5;d.x=Math.random()*LVLW}});break;
case'narrowpass':break}});

// Power-ups
powerups.forEach(pu=>{if(pu.collected)return;pu.bob+=.06;
const py=pu.y+Math.sin(pu.bob)*8;
if(P.x+P.w>pu.x&&P.x<pu.x+pu.w&&P.y+P.h>py&&P.y<py+pu.h){
pu.collected=true;snd('powerup');
const dur=600; // 10 sec
puState[pu.type]=dur;
const names={coffee:'Kávé! Gyorsabb!',magnet:'Mágnes! Szotyi vonzás!',double:'Dupla kaka!'};
addFT(pu.x,py-20,names[pu.type]||'Power-up!','#00FF00',20)}});

// Boss
if(boss&&boss.alive&&P.x>boss.x-400)bossActive=true;
if(boss&&boss.alive&&bossActive){
boss.flyT+=.03;boss.y=boss.startY+Math.sin(boss.flyT)*60;
boss.x+=boss.vx;if(Math.abs(boss.x-boss.startX)>boss.patrol)boss.vx*=-1;
if(boss.flash>0)boss.flash--;
boss.attackT++;
if(boss.attackT>90){boss.attackT=0;
// Boss shoots 3 bullets
for(let i=-1;i<=1;i++){
const a=Math.atan2(P.y-boss.y,P.x-boss.x)+i*.3;

function drawBld(b,bx){
const y=b.y,w=b.w,h=b.h;
ctx.save();
// Generic building style
const pals={berhaz:{w:'#F5DEB3',t:'#D2B48C',r:'#8B4513',wi:'#6BA3D6'},
berhaz2:{w:'#FFE4C4',t:'#DEB887',r:'#A0522D',wi:'#7BB5E0'},
berhaz3:{w:'#E8D5B7',t:'#C4A882',r:'#7B3F00',wi:'#5B93BE'},
berhaz4:{w:'#FFF8DC',t:'#EEE8AA',r:'#B8860B',wi:'#87CEEB'},
berhaz5:{w:'#FAF0E6',t:'#DDD0B8',r:'#A0522D',wi:'#6CA6CD'}};

// Check for special landmarks
if(drawLandmark(b.type,bx,y,w,h)){ctx.restore();return}

const p=pals[b.type]||pals.berhaz;
ctx.fillStyle=p.w;ctx.fillRect(bx,y,w,h);
ctx.strokeStyle=p.t;ctx.lineWidth=1;ctx.strokeRect(bx,y,w,h);
ctx.fillStyle=p.t;ctx.fillRect(bx,y,w,5);
const flH=35;for(let fy=y+flH;fy<y+h-30;fy+=flH)ctx.fillRect(bx,fy,w,2);
ctx.fillStyle=p.r;ctx.fillRect(bx-2,y-5,w+4,7);
// Windows
const wW=12,wH=18,cols=Math.max(1,Math.floor((w-16)/22)),stX=bx+(w-cols*22+10)/2;
for(let fy=y+10;fy<y+h-35;fy+=flH)for(let c=0;c<cols;c++){
const wx=stX+c*22;ctx.fillStyle=p.wi;ctx.fillRect(wx,fy,wW,wH);
ctx.strokeStyle='#F5F5F0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wx+wW/2,fy);ctx.lineTo(wx+wW/2,fy+wH);
ctx.moveTo(wx,fy+wH/2);ctx.lineTo(wx+wW,fy+wH/2);ctx.stroke();
ctx.fillStyle=p.t;ctx.fillRect(wx-2,fy+wH,wW+4,3)}
// Door
ctx.fillStyle='#654321';const dW=16,dH=28,dX=bx+w/2-dW/2;ctx.fillRect(dX,y+h-dH,dW,dH);
ctx.restore()}

// ===== DRAW HAZARDS =====
function drawHazard(hz){
const hx=hz.x-cam.x;
switch(hz.type){
case'fountain':
ctx.fillStyle='#999';ctx.fillRect(hx,GY-20,hz.w,20);ctx.fillRect(hx-5,GY-25,hz.w+10,8);
if(hz.active){ctx.strokeStyle='#6AF';ctx.lineWidth=2;
for(let i=0;i<3;i++){const off=Math.sin(Date.now()/100+i)*5;
ctx.beginPath();ctx.moveTo(hx+hz.w/2+off,GY-25);ctx.lineTo(hx+hz.w/2+off+(Math.random()-.5)*10,GY-25-hz.h);ctx.stroke()}}break;
case'wire':
const wx=hz.x-cam.x;
ctx.strokeStyle=hz.zapT%90<10?'#FF0':'#333';ctx.lineWidth=hz.zapT%90<10?4:2;
ctx.beginPath();ctx.moveTo(wx,hz.y);ctx.lineTo(wx+hz.w,hz.y);ctx.stroke();
if(hz.zapT%90<10){ctx.fillStyle='rgba(255,255,0,0.2)';ctx.fillRect(wx-5,hz.y-15,hz.w+10,30)}
// Poles
ctx.fillStyle='#555';ctx.fillRect(wx-3,hz.y,6,GY-hz.y);ctx.fillRect(wx+hz.w-3,hz.y,6,GY-hz.y);break;
case'train':
if(!hz.active)return;const tx=hz.x-cam.x;
ctx.fillStyle='#444';ctx.fillRect(tx,hz.y,hz.w,hz.h);
ctx.fillStyle='#888';ctx.fillRect(tx+5,hz.y+5,hz.w-10,hz.h-15);
for(let i=0;i<4;i++){ctx.fillStyle='#FFD700';ctx.fillRect(tx+20+i*55,hz.y+8,30,hz.h-20)}
ctx.fillStyle='#333';ctx.beginPath();ctx.arc(tx+30,hz.y+hz.h,8,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(tx+hz.w-30,hz.y+hz.h,8,0,Math.PI*2);ctx.fill();break;
case'gondola':
const gx=hz.x-cam.x;
ctx.fillStyle='#333';ctx.beginPath();ctx.moveTo(gx,GY-10);ctx.lineTo(gx+hz.w,GY-10);
ctx.lineTo(gx+hz.w+15,GY-5);ctx.lineTo(gx-15,GY-5);ctx.fill();
ctx.fillStyle='#8B4513';ctx.fillRect(gx+hz.w/2-2,GY-35,4,25);break;
case'lowbridge':
const lx=hz.x-cam.x;
ctx.fillStyle='#A08060';ctx.fillRect(lx,hz.y,hz.w,hz.h);
ctx.fillStyle='#907050';ctx.beginPath();ctx.arc(lx+hz.w/2,hz.y+hz.h,hz.w/2,0,Math.PI);ctx.fill();
ctx.fillStyle='#FF0';ctx.font='bold 10px "Comic Sans MS"';ctx.textAlign='center';
ctx.fillText('⚠',lx+hz.w/2,hz.y-3);ctx.textAlign='left';break;
case'crane':
const crx=hz.x-cam.x;
ctx.fillStyle='#FF8C00';ctx.fillRect(crx,hz.y,hz.w,hz.h);ctx.fillRect(crx-50,hz.y,100,8);
if(hz.dropping){ctx.fillStyle='#888';ctx.fillRect(hz.dropX-cam.x-8,hz.dropY,16,16);
ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(hz.dropX-cam.x,hz.y);ctx.lineTo(hz.dropX-cam.x,hz.dropY);ctx.stroke()}break;
case'narrowpass':
const nx=hz.x-cam.x;
ctx.fillStyle='#A08060';ctx.fillRect(nx,hz.y,hz.w,hz.topH);
ctx.fillStyle='#FF0';ctx.font='bold 10px "Comic Sans MS"';ctx.textAlign='center';
ctx.fillText('↕',nx+hz.w/2,hz.y+hz.topH+15);ctx.textAlign='left';break}}

'','Verebek: Csípd meg szemből vagy ugorj rájuk!',
'Emberek: Kakáld le őket a levegőből!',
'Gyűjts össze 3 szotyit és repülj a célba!']:[
'Nyilak / WASD - Mozgás és ugrás',
'Felső nyíl tartva - Repülés',
'SPACE - Kakálás a levegőből (3 mp újratöltés)',
'','Verebek: Csípd meg szemből vagy ugorj rájuk!',
'Emberek: Csúzlival lőnek - kakáld le őket!',
'Gyűjts össze 3 szotyit és repülj a célba!'];
ins.forEach((l,i)=>ctx.fillText(l,CW/2,260+i*22));

// High scores
if(highScores.length>0){ctx.fillStyle='#FFD700';ctx.font='bold 14px "Comic Sans MS"';ctx.fillText('🏆 Legjobb eredmények:',CW/2,430);
ctx.font='13px "Comic Sans MS"';ctx.fillStyle='#fff';
highScores.slice(0,5).forEach((s,i)=>ctx.fillText(`${i+1}. ${s.score} pont - ${s.level}. pálya`,CW/2,450+i*18))}

const pulse=.7+Math.sin(Date.now()/300)*.3;ctx.globalAlpha=pulse;
ctx.fillStyle='#FFD700';ctx.font='bold 22px "Comic Sans MS"';
ctx.fillText(isMobile?'Érintsd meg a képernyőt!':'Nyomj ENTER-t vagy SPACE-t!',CW/2,CH-30);
ctx.globalAlpha=1;ctx.textAlign='left'}

function drawLC(){
lvlCompT--;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
ctx.fillStyle='#00FF00';ctx.font='bold 42px "Comic Sans MS"';ctx.textAlign='center';
ctx.fillText('Pálya teljesítve!',CW/2,CH/2-40);
ctx.fillStyle='#FFD700';ctx.font='24px "Comic Sans MS"';
ctx.fillText(`Szotyi: ${seedsC}/${seedsT}`,CW/2,CH/2+10);
ctx.fillText('Pontszám: '+score,CW/2,CH/2+45);
ctx.textAlign='left';
if(lvlCompT<=0){curLvl++;
if(curLvl>=LEVELS.length){saveHS();gs='win'}
else{genLevel(curLvl);gs='playing'}}}

function drawGO(){
deathT++;ctx.fillStyle='rgba(80,0,0,0.75)';ctx.fillRect(0,0,CW,CH);
if(imgs.player_dead?.complete)ctx.drawImage(imgs.player_dead,CW/2-45,CH/2-130,90,140);
ctx.fillStyle='#FF4444';ctx.font='bold 48px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('Játék vége!',CW/2,CH/2+40);
ctx.fillStyle='#FFD700';ctx.font='24px "Comic Sans MS"';ctx.fillText('Pontszám: '+score,CW/2,CH/2+80);
if(deathT>60){ctx.fillStyle='#fff';ctx.fillText(isMobile?'Érintsd meg az újrakezdéshez!':'Nyomj ENTER-t az újrakezdéshez!',CW/2,CH/2+120)}
ctx.textAlign='left'}

function drawWin(){
ctx.fillStyle='rgba(0,40,0,0.8)';ctx.fillRect(0,0,CW,CH);
for(let i=0;i<30;i++){ctx.fillStyle=['#FFD700','#FF6347','#00FF00','#FF69B4','#00BFFF'][i%5];
ctx.fillRect((Math.sin(Date.now()/500+i*73)+1)/2*CW,(Date.now()/10+i*47)%CH,6,6)}
if(imgs.player?.complete)ctx.drawImage(imgs.player,CW/2-55,CH/2-180,110,170);
ctx.fillStyle='#FFD700';ctx.font='bold 48px "Comic Sans MS"';ctx.textAlign='center';ctx.fillText('GYŐZELEM!',CW/2,CH/2+30);
ctx.fillStyle='#fff';ctx.font='24px "Comic Sans MS"';ctx.fillText('A világ megmentve a szotyi-tolvajoktól!',CW/2,CH/2+70);
ctx.fillStyle='#FFD700';ctx.font='22px "Comic Sans MS"';ctx.fillText('Végső pontszám: '+score,CW/2,CH/2+110);
ctx.fillText(isMobile?'Érintsd meg az újrakezdéshez!':'Nyomj ENTER-t az újrakezdéshez!',CW/2,CH/2+145);
ctx.textAlign='left'}

function drawHS(){
ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,CW,CH);
ctx.fillStyle='#FFD700';ctx.font='bold 36px "Comic Sans MS"';ctx.textAlign='center';
ctx.fillText('🏆 Dicsőségtábla',CW/2,60);
ctx.font='20px "Comic Sans MS"';ctx.fillStyle='#fff';
highScores.slice(0,10).forEach((s,i)=>{
ctx.fillStyle=i<3?['#FFD700','#C0C0C0','#CD7F32'][i]:'#fff';
ctx.fillText(`${i+1}. ${s.score} pont - ${LEVELS[Math.min(s.level,LEVELS.length-1)]?.name||'?'} (${s.level+1}. pálya)`,CW/2,100+i*30)});
ctx.fillStyle='#FFD700';ctx.fillText('Nyomj ENTER-t a folytatáshoz!',CW/2,CH-40);
ctx.textAlign='left'}

function saveHS(){
highScores.push({score,level:curLvl});
highScores.sort((a,b)=>b.score-a.score);
highScores=highScores.slice(0,10);
localStorage.setItem('szencinege_hs',JSON.stringify(highScores))}

function menuInput(){
if(gs==='menu'){gs='playing';curLvl=0;score=0;lives=3;genLevel(0);AC.resume()}
else if(gs==='gameOver'&&deathT>60){saveHS();gs='playing';score=0;lives=3;genLevel(curLvl)}
else if(gs==='win'){gs='highscores'}
else if(gs==='highscores'){gs='menu';curLvl=0;score=0;lives=3;genLevel(0)}}

// ===== GAME LOOP =====
genLevel(0);
function loop(){update();draw();requestAnimationFrame(loop)}
function wait(){if(imgsL>=imgK.length)loop();else setTimeout(wait,50)}
wait();
</script>
</body>
</html>
